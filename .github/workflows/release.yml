# Builds the Android APK and attaches it to a GitHub Release.
#
# Trigger a release:   git tag v1.0.0 && git push origin v1.0.0
# Manual test build:   Actions tab -> "Release APK" -> Run workflow (uploads an
#                      artifact, does not create a release).
#
# Required repository secrets (Settings > Secrets and variables > Actions):
#   SUPABASE_URL         your Supabase project URL
#   SUPABASE_ANON_KEY    your Supabase anon key (public by design, RLS enforced)
# Optional:
#   GOOGLE_SERVICES_JSON base64 of google-services.json -> native Android push (FCM)
#   KEYSTORE_BASE64      base64 of a signing keystore (.jks)
#   KEYSTORE_PASSWORD    keystore password
#   KEY_ALIAS            key alias
#   KEY_PASSWORD         key password
# Without a keystore the APK is debug-signed: installable, but updates between
# releases will require uninstall/reinstall. A keystore is strongly recommended.

name: Release APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Generate SupabaseConfig.kt from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Missing SUPABASE_URL / SUPABASE_ANON_KEY repository secrets. See .github/workflows/release.yml header."
            exit 1
          fi
          cat > composeApp/src/commonMain/kotlin/com/baltajmn/aptracker/core/data/SupabaseConfig.kt <<EOF
          package com.baltajmn.aptracker.core.data

          object SupabaseConfig {
              const val URL = "$SUPABASE_URL"
              const val ANON_KEY = "$SUPABASE_ANON_KEY"
          }
          EOF

      - name: Add google-services.json (optional, enables FCM)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 -d > composeApp/google-services.json
            echo "FCM enabled (google-services.json present)"
          else
            echo "No GOOGLE_SERVICES_JSON secret; building without FCM (ntfy-only push)"
          fi

      - name: Prepare signing keystore (optional)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "RELEASE_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
          else
            echo "::warning::No KEYSTORE_BASE64 secret; falling back to a debug-signed APK."
          fi

      - name: Build APK
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.$GITHUB_RUN_NUMBER"
          fi
          if [ -n "$RELEASE_KEYSTORE_PATH" ]; then
            ./gradlew :composeApp:assembleRelease -PversionName="$VERSION" -PversionCode="$GITHUB_RUN_NUMBER"
            APK=composeApp/build/outputs/apk/release/composeApp-release.apk
          else
            ./gradlew :composeApp:assembleDebug -PversionName="$VERSION" -PversionCode="$GITHUB_RUN_NUMBER"
            APK=composeApp/build/outputs/apk/debug/composeApp-debug.apk
          fi
          cp "$APK" "ApTracker-$VERSION.apk"
          echo "APK_NAME=ApTracker-$VERSION.apk" >> "$GITHUB_ENV"

      - name: Create GitHub Release with APK (tag builds)
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "$APK_NAME" \
            --title "ApTracker $GITHUB_REF_NAME" \
            --generate-notes

      - name: Upload APK as artifact (manual builds)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_NAME }}
